<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản | Shop Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ee9ca7 0%, #ffdde1 100%);
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .register-container {
            background: #ffffff; padding: 40px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px;
        }
        .btn-register {
            background: #ee9ca7; color: white; border: none;
            border-radius: 50px; padding: 12px; font-weight: 600;
        }
        .btn-register:hover { background: #d88a94; color: white; }
        .form-control { border-radius: 10px; padding: 10px; border: 1px solid #eee; }
        #errorMsg { display: none; }
    </style>
</head>
<body>

<div class="register-container">
    <div class="text-center mb-4">
        <h3 class="fw-bold">Tạo tài khoản</h3>
        <p class="text-muted small">Tham gia cùng cộng đồng mua sắm của chúng tôi</p>
    </div>

    <div id="errorMsg" class="alert alert-danger small mb-3"></div>

    <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="row">
            <div class="col-md-12 mb-3">
                <label class="form-label small fw-bold">Họ và tên</label>
                <input type="text" id="fullName" name="fullName" class="form-control" placeholder="Nguyễn Văn A" required>
            </div>
            <div class="col-md-12 mb-3">
                <label class="form-label small fw-bold">Tên đăng nhập</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="user123" required>
            </div>
            <div class="col-md-12 mb-3">
                <label class="form-label small fw-bold">Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="email@example.com" required>
            </div>
            <div class="col-md-12 mb-4">
                <label class="form-label small fw-bold">Mật khẩu</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
        </div>
        <button type="submit" class="btn btn-register w-100 mb-3 shadow-sm">ĐĂNG KÝ NGAY</button>
    </form>

    <div class="text-center">
        <p class="small text-muted">Đã có tài khoản? <a href="/login" class="text-decoration-none fw-bold" style="color: #ee9ca7;">Đăng nhập</a></p>
    </div>
</div>

<script>
    async function handleRegister(event) {
        event.preventDefault(); // Chặn load lại trang

        const errorDiv = document.getElementById('errorMsg');
        errorDiv.style.display = 'none';

        // Lấy dữ liệu từ form
        const userData = {
            fullName: document.querySelector('input[name="fullName"]').value,
            username: document.querySelector('input[name="username"]').value,
            email: document.querySelector('input[name="email"]').value,
            password: document.querySelector('input[name="password"]').value
        };

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(userData)
            });

            if (response.ok) {
                alert("Đăng ký thành công!");
                window.location.href = '/login';
            } else {
                // Đọc lỗi từ backend trả về (thường là lỗi trùng username/email)
                const msg = await response.text();
                errorDiv.innerText = "Lỗi: " + msg;
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            errorDiv.innerText = "Không thể kết nối đến hệ thống!";
            errorDiv.style.display = 'block';
        }
    }
</script>

</body>
</html>
