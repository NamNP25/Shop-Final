<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ - Shop 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .product-card { transition: transform 0.3s; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { height: 200px; object-fit: cover; border-top-left-radius: 0.375rem; border-top-right-radius: 0.375rem; }
        .navbar-custom { background-color: #212529; }
        .cart-badge { font-size: 0.7rem; padding: 0.2rem 0.4rem; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🛍️ SHOP 2026</a>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link active" href="/">Trang chủ</a></li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-warning fw-bold" href="/admin/products">
                        <i class="bi bi-gear-fill"></i> Quản lý kho
                    </a>
                </li>
            </ul>

            <div class="d-flex align-items-center">
                <a href="/cart" class="nav-link text-white me-4 position-relative" sec:authorize="hasRole('USER')">
                    <i class="bi bi-cart3 fs-4"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger cart-badge"
                          th:text="${session.cart != null ? session.cart.size() : 0}">0</span>
                </a>

                <div class="text-white me-3">
                    Xin chào, <strong th:text="${#authentication.name}">Guest</strong>
                </div>
                <a href="/logout" class="btn btn-outline-light btn-sm">Đăng xuất</a>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="bg-white p-5 rounded-4 shadow-sm text-center mb-5">
        <h1 class="fw-bold">Chào mừng bạn đến với Shop</h1>
        <p class="lead text-muted">Dự án quản lý bán hàng phiên bản 2026.</p>
    </div>

    <h3 class="mb-4 fw-bold text-dark">SẢN PHẨM MỚI NHẤT</h3>

    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
        <div class="col" th:each="p : ${products}">
            <div class="card h-100 product-card shadow-sm">
                <img th:src="${p.image != null} ? @{'/images/' + ${p.image}} : 'https://via.placeholder.com/200'"
                     class="card-img-top product-img" alt="Product Image">

                <div class="card-body d-flex flex-column">
                    <h6 class="card-title fw-bold" th:text="${p.name}">Tên sản phẩm</h6>
                    <p class="card-text text-danger fs-5 fw-bold mt-auto"
                       th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT') + 'đ'}"></p>

                    <div class="d-grid gap-2 mt-3">
                        <a th:href="@{/cart/add/{id}(id=${p.id})}" class="btn btn-primary btn-sm" sec:authorize="hasRole('USER')">
                            <i class="bi bi-cart-plus"></i> Mua ngay
                        </a>

                        <button class="btn btn-outline-secondary btn-sm" disabled sec:authorize="hasRole('ADMIN')">
                            Chế độ Admin
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="py-5 bg-dark mt-5 text-white text-center">
    <p class="mb-0">&copy; 2026 Shop Project - User Interface</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
