<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ - Shop Nam Phương</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .product-card { transition: transform 0.3s; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { height: 200px; object-fit: cover; border-top-left-radius: 0.375rem; border-top-right-radius: 0.375rem; }
        .navbar-custom { background-color: #212529; }
        .cart-badge { font-size: 0.75rem; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm mb-4 sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🛍️ SHOP Nam Phương</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link active" href="/">Trang chủ</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-warning fw-bold" href="/admin/products">
                        <i class="bi bi-gear-fill"></i> Quản lý kho
                    </a>
                </li>
            </ul>

            <div class="d-flex align-items-center">
                <a href="/cart" class="btn btn-outline-light me-4 position-relative border-0" sec:authorize="hasRole('USER')">
                    <i class="bi bi-cart3 fs-4"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger cart-badge"
                          th:text="${session.cart != null ? session.cart.size() : 0}">0</span>
                </a>

                <div class="text-white me-3 d-none d-md-block">
                    Xin chào, <strong th:text="${#authentication.name}">Guest</strong>
                </div>
                <a href="/logout" class="btn btn-danger btn-sm px-3 shadow-sm">Đăng xuất</a>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show shadow-sm border-0" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <strong th:text="${successMsg}"></strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${cartMsg}" class="alert alert-info alert-dismissible fade show shadow-sm border-0" role="alert">
        <i class="bi bi-cart-plus-fill me-2"></i>
        <strong th:text="${cartMsg}"></strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show shadow-sm border-0" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <strong th:text="${errorMsg}"></strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>

<div class="container">
    <div class="bg-white p-5 rounded-4 shadow-sm text-center mb-5 mt-2">
        <h1 class="fw-bold display-5">Chào mừng đến với Shop</h1>
        <p class="lead text-muted">Trải nghiệm mua sắm mượt mà, nhanh chóng và an toàn.</p>
    </div>

    <h3 class="mb-4 fw-bold text-dark text-uppercase border-start border-4 border-primary ps-3">Sản phẩm mới nhất</h3>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 mb-5">
        <div class="col" th:each="p : ${products}">
            <div class="card h-100 product-card shadow-sm">
                <img th:src="${p.image != null} ? @{'/images/' + ${p.image}} : 'https://via.placeholder.com/200'"
                     class="card-img-top product-img" alt="Product Image">

                <div class="card-body d-flex flex-column">
                    <h6 class="card-title fw-bold text-dark text-truncate" th:text="${p.name}">Tên sản phẩm</h6>
                    <p class="card-text text-danger fs-5 fw-bold mt-auto"
                       th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT') + ' đ'}"></p>

                    <div class="d-grid gap-2 mt-3">
                        <a th:href="@{/cart/add/{id}(id=${p.id})}" class="btn btn-primary btn-sm py-2 fw-bold" sec:authorize="hasRole('USER')">
                            <i class="bi bi-cart-plus"></i> THÊM VÀO GIỎ
                        </a>

                        <button class="btn btn-outline-secondary btn-sm disabled" sec:authorize="hasRole('ADMIN')">
                            <i class="bi bi-lock"></i> CHẾ ĐỘ ADMIN
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="py-5 bg-dark mt-auto text-white text-center">
    <div class="container">
        <p class="mb-0 opacity-75">&copy; Nam Phương Shop Project - Built with Spring Boot & Thymeleaf</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
