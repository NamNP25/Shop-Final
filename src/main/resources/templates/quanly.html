<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản trị kho - Shop 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .img-table { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        .navbar-admin { background-color: #0d6efd; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark navbar-admin shadow mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/admin/products">ADMIN PANEL</a>
        <div class="ms-auto d-flex align-items-center">
            <a href="/" class="btn btn-light btn-sm me-3"><i class="bi bi-house"></i> Về Trang Chủ</a>
            <a href="/logout" class="btn btn-danger btn-sm">Thoát</a>
        </div>
    </div>
</nav>

<div class="container py-2">
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
            <h5 class="mb-0 fw-bold">QUẢN LÝ KHO HÀNG</h5>
            <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#addModal">
                <i class="bi bi-plus-circle"></i> Nhập hàng mới
            </button>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th class="ps-3">ID</th>
                    <th>Ảnh</th>
                    <th>Tên sản phẩm</th>
                    <th>Giá niêm yết</th>
                    <th class="text-center">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${products}">
                    <td class="ps-3" th:text="${p.id}"></td>
                    <td>
                        <img th:src="${p.image != null} ? @{'/images/' + ${p.image}} : 'https://via.placeholder.com/50'" class="img-table">
                    </td>
                    <td th:text="${p.name}" class="fw-bold"></td>
                    <td th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-primary btn-edit" th:data-id="${p.id}" th:data-name="${p.name}" th:data-price="${p.price}">Sửa</button>
                        <a th:href="@{/admin/products/delete/{id}(id=${p.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Xóa?')">Xóa</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    $(document).on("click", ".btn-edit", function() {
        $("#edit-id").val($(this).data('id'));
        $("#edit-name").val($(this).data('name'));
        $("#edit-price").val($(this).data('price'));
        $('#editModal').modal('show');
    });
</script>
</body>
</html>
