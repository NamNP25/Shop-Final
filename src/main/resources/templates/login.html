<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập | Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
    .login-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card login-card p-4">
        <div class="text-center mb-4">
          <h2 class="fw-bold text-dark">ĐĂNG NHẬP</h2>
          <p class="text-muted">Chào mừng bạn quay trở lại với Shop</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger small p-2 text-center">
          Tên đăng nhập hoặc mật khẩu không đúng!
        </div>

        <div th:if="${param.logout}" class="alert alert-success small p-2 text-center">
          Bạn đã đăng xuất thành công.
        </div>

        <form th:action="@{/login}" method="post">
          <div class="mb-3">
            <label class="form-label small fw-bold">Tên đăng nhập</label>
            <input type="text" name="username" class="form-control" placeholder="Nhập username" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Mật khẩu</label>
            <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required>
          </div>
          <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-primary btn-lg rounded-pill">Đăng nhập ngay</button>
          </div>
        </form>

        <div class="text-center mt-4">
          <span class="text-muted small">Chưa có tài khoản?</span>
          <a th:href="@{/register}" class="text-decoration-none small fw-bold"> Đăng ký ngay</a>
        </div>
        <div class="text-center mt-2">
          <a th:href="@{/}" class="text-muted small text-decoration-none"><i class="bi bi-arrow-left"></i> Quay lại trang chủ</a>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
