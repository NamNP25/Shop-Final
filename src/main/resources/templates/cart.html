<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng - Shop 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .product-img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; }
        .table align-middle td { vertical-align: middle; }
        .sticky-summary { position: -webkit-sticky; position: sticky; top: 20px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-arrow-left"></i> TIẾP TỤC MUA SẮM</a>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4 fw-bold text-uppercase"><i class="bi bi-cart-check-fill text-success"></i> Giỏ hàng của bạn</h2>

    <div class="row">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm overflow-hidden mb-4">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">Sản phẩm</th>
                        <th>Giá</th>
                        <th style="width: 100px;">Số lượng</th>
                        <th>Tổng cộng</th>
                        <th class="text-center">Xóa</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${cart}">
                        <td class="ps-4">
                            <div class="d-flex align-items-center">
                                <img th:src="${item.image != null} ? @{'/images/' + ${item.image}} : 'https://via.placeholder.com/70'"
                                     class="product-img me-3 border">
                                <span class="fw-bold text-dark" th:text="${item.name}"></span>
                            </div>
                        </td>
                        <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
                        <td>
                            <span class="badge bg-secondary px-3 py-2 fs-6" th:text="${item.quantity}"></span>
                        </td>
                        <td class="fw-bold text-primary"
                            th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT') + ' đ'}">
                        </td>
                        <td class="text-center">
                            <a th:href="@{/cart/remove/{id}(id=${item.productId})}"
                               class="btn btn-sm btn-outline-danger border-0">
                                <i class="bi bi-trash3 fs-5"></i>
                            </a>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(cart)}">
                        <td colspan="5" class="text-center py-5">
                            <div class="text-muted">
                                <i class="bi bi-cart-x fs-1"></i>
                                <p class="mt-2">Giỏ hàng của bạn hiện đang trống!</p>
                                <a href="/" class="btn btn-primary btn-sm mt-3">Quay lại mua sắm ngay</a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card border-0 shadow-sm p-4 sticky-summary">
                <h4 class="fw-bold mb-4">Thông tin đơn hàng</h4>

                <form th:action="@{/order/checkout}" method="post" th:if="${cart != null and !cart.isEmpty()}">
                    <div class="card border-0 shadow-sm p-4 sticky-top" style="top: 20px;">
                        <h4 class="fw-bold mb-4">Thông tin giao hàng</h4>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Tên người nhận</label>
                            <input type="text" name="customerName" class="form-control"
                                   th:value="${#authentication.name}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Số điện thoại</label>
                            <input type="text" name="phoneNumber" class="form-control"
                                   placeholder="Nhập số điện thoại..." required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold">Địa chỉ chi tiết</label>
                            <textarea name="address" class="form-control" rows="2"
                                      placeholder="Số nhà, tên đường, phường/xã..." required></textarea>
                        </div>

                        <div class="d-flex justify-content-between mb-4">
                            <span class="fs-5 fw-bold">Tổng cộng:</span>
                            <span class="fs-4 fw-bold text-danger"
                                  th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT') + ' đ'}"></span>
                        </div>

                        <button type="submit" class="btn btn-success w-100 py-3 fw-bold text-uppercase">
                            Xác nhận đặt hàng <i class="bi bi-bag-check-fill"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<footer class="py-5 bg-dark mt-5 text-white text-center">
    <p class="mb-0">&copy; 2026 Shop Project - Cart Page</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
