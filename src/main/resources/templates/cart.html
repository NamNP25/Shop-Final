<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng - Shop 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .product-img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; }
        .align-middle td { vertical-align: middle; }
        .sticky-summary { position: sticky; top: 20px; }
        .empty-cart-icon { font-size: 5rem; color: #dee2e6; }
    </style>
</head>
<div th:if="${errorMsg}" class="alert alert-danger"
     style="color: white; background-color: #dc3545; padding: 15px; margin: 10px 0; border-radius: 5px;">
    <strong th:text="${errorMsg}"></strong>
</div>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-arrow-left"></i> TIẾP TỤC MUA SẮM</a>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4 fw-bold text-uppercase"><i class="bi bi-cart-check-fill text-success"></i> Giỏ hàng của bạn</h2>

    <div class="row" th:if="${session.cart != null and !session.cart.isEmpty()}">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm overflow-hidden mb-4">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">Sản phẩm</th>
                        <th>Giá</th>
                        <th style="width: 150px;">Số lượng</th>
                        <th>Tổng cộng</th>
                        <th class="text-center">Xóa</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${session.cart.values()}" th:id="'row-' + ${item.productId}">
                        <td class="ps-4">
                            <div class="d-flex align-items-center">
                                <img th:src="${item.image != null} ? @{'/images/' + ${item.image}} : 'https://via.placeholder.com/70'"
                                     class="product-img me-3 border">
                                <span class="fw-bold text-dark" th:text="${item.name}"></span>
                            </div>
                        </td>
                        <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
                        <td>
                            <div class="input-group input-group-sm">
                                <button class="btn btn-outline-secondary" type="button"
                                        th:onclick="'changeQuantity(' + ${item.productId} + ', -1)'">-</button>
                                <input type="text" th:id="'qty-' + ${item.productId}"
                                       class="form-control text-center" th:value="${item.quantity}" readonly>
                                <button class="btn btn-outline-secondary" type="button"
                                        th:onclick="'changeQuantity(' + ${item.productId} + ', 1)'">+</button>
                            </div>
                        </td>
                        <td class="fw-bold text-primary" th:id="'total-' + ${item.productId}"
                            th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT') + ' đ'}">
                        </td>
                        <td class="text-center">
                            <a th:href="@{/cart/remove/{id}(id=${item.productId})}" class="btn btn-sm text-danger">
                                <i class="bi bi-trash3 fs-5"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card border-0 shadow-sm p-4 sticky-summary">
                <h4 class="fw-bold mb-4 border-bottom pb-2">Thanh toán</h4>
                <form th:action="@{/order/checkout}" method="post">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-uppercase">Tên người nhận</label>
                        <input type="text" name="customerName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-uppercase">Số điện thoại</label>
                        <input type="tel" name="phoneNumber" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase">Địa chỉ giao hàng</label>
                        <textarea name="address" class="form-control" rows="2" required></textarea>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between mb-4">
                        <span class="fs-5 fw-bold">Tổng cộng:</span>
                        <span class="fs-4 fw-bold text-danger" id="cart-grand-total"
                              th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT') + ' đ'}"></span>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-3 fw-bold text-uppercase shadow">
                        Xác nhận đặt hàng <i class="bi bi-chevron-right"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="row" th:if="${session.cart == null or session.cart.isEmpty()}">
        <div class="col-12 text-center py-5">
            <div class="card border-0 shadow-sm py-5">
                <i class="bi bi-cart-x empty-cart-icon"></i>
                <h3 class="mt-3 fw-bold text-muted">Giỏ hàng trống</h3>
                <a href="/" class="btn btn-primary mt-4 px-5">QUAY LẠI CỬA HÀNG</a>
            </div>
        </div>
    </div>
</div>

<script>
    function changeQuantity(productId, delta) {
        const qtyInput = $('#qty-' + productId);
        let newQty = parseInt(qtyInput.val()) + delta;

        if (newQty < 1) {
            if (confirm("Xóa sản phẩm khỏi giỏ hàng?")) window.location.href = '/cart/remove/' + productId;
            return;
        }

        $.post('/cart/update-quantity', { id: productId, qty: newQty }, function(res) {
            qtyInput.val(res.newQty);
            $('#total-' + productId).text(res.itemTotal.toLocaleString('vi-VN') + ' đ');
            $('#cart-grand-total').text(res.cartTotal.toLocaleString('vi-VN') + ' đ');
        }).fail(function(xhr) {
            alert(xhr.responseText);
        });
    }
</script>
</body>
</html>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script> <script>
function changeQuantity(productId, delta) {
const qtyInput = document.getElementById('qty-' + productId);
let newQty = parseInt(qtyInput.value) + delta;

if (newQty < 1) {
if (!confirm("Xóa sản phẩm này khỏi giỏ hàng?")) return;
newQty = 0; // Gửi 0 để Service xóa khỏi Map
}

$.ajax({
url: '/cart/update-quantity', // Phải khớp với @PostMapping trong Java
type: 'POST',
data: {
id: productId,
qty: newQty
},
success: function(res) {
if (res.removed) {
document.getElementById('row-' + productId).remove();
} else {
qtyInput.value = res.newQty;
document.getElementById('total-' + productId).innerText = res.itemTotal.toLocaleString() + ' đ';
}
document.getElementById('cart-grand-total').innerText = res.cartTotal.toLocaleString() + ' đ';
},
error: function(err) {
alert("Không thể cập nhật số lượng!");
}
});
}
</script>
